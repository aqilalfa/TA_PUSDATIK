version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: spbe-qdrant-prod
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: always
    networks:
      - spbe-network
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:6334"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: spbe-backend-prod
    env_file: .env.docker
    environment:
      DEBUG: "false"
      RELOAD: "false"
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      DATABASE_URL: "sqlite:////app/data/spbe_rag.db"
      QDRANT_URL: "http://qdrant:6333"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models:ro
      - ./logs/backend:/app/logs
    depends_on:
      qdrant:
        condition: service_healthy
    restart: always
    networks:
      - spbe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Frontend (nginx serving Vue build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: spbe-frontend-prod
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - spbe-network

networks:
  spbe-network:
    driver: bridge
