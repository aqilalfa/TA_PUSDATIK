version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: spbe-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC port
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - spbe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: spbe-backend
    ports:
      - "8000:8000"
    volumes:
      # Models (read-only)
      - ./models:/app/models:ro
      
      # Data directories
      - ./data:/app/data
      - ./database:/app/database
      - ./logs/backend:/app/logs
      
      # HOT-RELOAD: Mount source code for development
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests
      
      # Don't mount Python cache
      - /app/app/__pycache__
    environment:
      # Qdrant
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=spbe_documents
      
      # Models
      - MODEL_PATH=/app/models/llm/qwen-2.5-7b-instruct-q4_k_m.gguf
      - MODEL_N_GPU_LAYERS=35
      - MODEL_N_CTX=8192
      - MODEL_N_BATCH=512
      - MODEL_TEMP=0.1
      
      - EMBEDDING_MODEL=firqaaa/indo-sentence-bert-base
      - EMBEDDING_CACHE_DIR=/app/models/embeddings
      - EMBEDDING_DEVICE=cpu
      
      - RERANKER_MODEL=BAAI/bge-reranker-base
      - RERANKER_CACHE_DIR=/app/models/reranker
      - RERANKER_DEVICE=cpu
      - RERANKER_TOP_K=10
      
      # Database
      - DATABASE_URL=sqlite:////app/database/spbe_rag.db
      
      # API
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173,http://localhost:3000
      
      # Development settings
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - LOG_DIR=/app/logs
      - RELOAD=true
      
      # GPU
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - spbe-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Frontend Vue.js Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: spbe-frontend
    ports:
      - "5173:5173"  # Vite dev server port
    volumes:
      # Hot-reload for frontend
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - /app/node_modules  # Don't mount node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - spbe-network
    command: npm run dev -- --host 0.0.0.0

networks:
  spbe-network:
    driver: bridge
