version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: spbe-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC port
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - spbe-network
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:6334"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: spbe-backend
    ports:
      - "8000:8000"
    volumes:
      # Models (read-only)
      - ./backend/models:/app/models:ro

      # Data directory (DB, BM25 index, marker output, documents)
      - ./backend/data:/app/data
      - ./logs/backend:/app/logs

      # HOT-RELOAD: Mount source code for development
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests

      # Don't mount Python cache
      - /app/app/__pycache__
    environment:
      # Qdrant
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=document_chunks

      # Embeddings
      - EMBEDDING_MODEL=firqaaa/indo-sentence-bert-base
      - EMBEDDING_CACHE_DIR=/app/models/embeddings
      - EMBEDDING_DEVICE=cpu

      # Reranker
      - RERANKER_MODEL=BAAI/bge-reranker-base
      - RERANKER_CACHE_DIR=/app/models/reranker
      - RERANKER_DEVICE=cpu
      - RERANKER_TOP_K=10

      # Database (correct container path)
      - DATABASE_URL=sqlite:////app/data/spbe_rag.db

      # API
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173,http://localhost:3000}

      # Ollama (runs on host, accessed via host.docker.internal)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

      # Development settings
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - LOG_DIR=/app/logs
      - RELOAD=true

      # GPU
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - spbe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Frontend Vue.js Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: spbe-frontend
    ports:
      - "5173:5173"  # Vite dev server port
    volumes:
      # Hot-reload for frontend
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - /app/node_modules  # Don't mount node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - VITE_BACKEND_PROXY=http://backend:8000
      - NODE_ENV=development
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - spbe-network
    command: npm run dev -- --host 0.0.0.0

networks:
  spbe-network:
    driver: bridge
