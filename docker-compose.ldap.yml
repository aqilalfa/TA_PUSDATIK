version: '3.8'

services:
  # OpenLDAP server for real LDAP testing
  ldap:
    image: osixia/openldap:1.5.0
    container_name: bssn-ldap-test
    environment:
      LDAP_ORGANISATION: "Badan Siber dan Sandi Negara"
      LDAP_DOMAIN: "bssn.go.id"
      LDAP_BASE_DN: "dc=bssn,dc=go,dc=id"
      LDAP_ADMIN_PASSWORD: "AdminPassword123!"
      LDAP_CONFIG_PASSWORD: "ConfigPassword123!"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ./ldap_bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/bootstrap.ldif:ro
    networks:
      - ldap_network
    healthcheck:
      test: ["CMD", "ldapwhoami", "-H", "ldap://localhost", "-D", "cn=admin,dc=bssn,dc=go,dc=id", "-w", "AdminPassword123!"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # phpLDAPadmin for LDAP management UI (optional)
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: bssn-phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
      PHPLDAPADMIN_LDAP_CLIENT_ADD: "false"
    ports:
      - "6680:80"
    depends_on:
      - ldap
    networks:
      - ldap_network
    restart: unless-stopped

volumes:
  ldap_data:
  ldap_config:

networks:
  ldap_network:
    driver: bridge
